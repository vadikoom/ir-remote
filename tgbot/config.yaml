# bot always responds with same keyboard
keyboard:
#  - [ *nameOff,    *nameOff15, *nameCool24, *nameDeh20 ]
#  - [ *nameStatus, *nameOff30, *nameCool20, *nameDeh24 ]
  - [ *nameOff, *nameOff15, *nameOff30, *nameOff60 ]
  - [ *nameStatus, *nameDeh20, *nameDeh24, *nameCool20 ]

server:
  onlineMessage: "✅пульт працює"
  offlineMessage: "❌пульт не працює"

# commands scripts. Rust code only execute scripts here, it is not aware of meaning of commands
commands:
  off:
    trigger: { type: exactMessage, text: *nameOff }
    actions:
      - { type: sendRawCommand, bytes: *bytesOff}
      - { type: delay, seconds: 0, key: off } # this will cancel any pending off command
      - { type: respond, text: "вимкнено\n{statusMessage}"}

  offAfter30:
    trigger: { type: exactMessage, text: *nameOff30 }
    actions:
      - { type: respond, text: "заплановано вимкнення через 30 хвилин\n{statusMessage}" }
      - { type: delay, seconds: *duration30min, key: off }
      - { type: sendRawCommand, bytes: *bytesOff}
      - { type: respond, text: "вимкнено\n{statusMessage}" }

  offAfter15:
    trigger: { type: exactMessage, text: *nameOff15 }
    actions:
      - { type: respond, text: "заплановано вимкнення через 15 хвилин\n{statusMessage}" }
      - { type: delay, seconds: *duration15min, key: off }
      - { type: sendRawCommand, bytes: *bytesOff}
      - { type: respond, text: "вимкнено\n{statusMessage}" }

  offAfter60:
    trigger: { type: exactMessage, text: *nameOff60 }
    actions:
      - { type: respond, text: "заплановано вимкнення через 60 хвилин\n{statusMessage}" }
      - { type: delay, seconds: *duration60min, key: off }
      - { type: sendRawCommand, bytes: *bytesOff}
      - { type: respond, text: "вимкнено\n{statusMessage}" }

  status:
    trigger: { type: exactMessage, text: *nameStatus }
    actions:
      - { type: respond, text: "{statusMessage}" }

  Cool20:
    trigger: { type: exactMessage, text: *nameCool20 }
    actions:
      - { type: sendRawCommand, bytes: *bytesCool20 }
      - { type: respond, text: "включено в режимі охолодження +20\n{statusMessage}"}

  Cool24:
    trigger: { type: exactMessage, text: *nameCool24 }
    actions:
      - { type: sendRawCommand, bytes: *bytesCool24 }
      - { type: respond, text: "включено в режимі охолодження +24\n{statusMessage}"}

  Deh20:
    trigger: { type: exactMessage, text: *nameDeh20 }
    actions:
      - { type: sendRawCommand, bytes: *bytesDeh20 }
      - { type: respond, text: "включено в режимі дегідратації +20\n{statusMessage}"}

  Deh24:
    trigger: { type: exactMessage, text: *nameDeh24 }
    actions:
      - { type: sendRawCommand, bytes: *bytesDeh24 }
      - { type: respond, text: "включено в режимі дегідратації +24\n{statusMessage}"}

handlers:
  genericError:
    actions:
      - { type: respond, text: "{error}" }

messages:
